name: Deploy to GitHub Pages

on:
  # Deploy on every push to main (including the hourly news auto-commit).
  push:
    branches: [main]
  # Allow manual runs and dispatch from the update-news workflow.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Assemble the static site into _site/ so we deploy only what's needed.
      - name: Prepare static site
        run: |
          mkdir -p _site

          # HTML pages
          cp *.html _site/

          # Assets (CSS + JS)
          cp -r assets     _site/

          # Serve news.json at root (sync from src/data/)
          cp src/data/news.json _site/news.json

          # Public assets (favicon, sounds)
          cp -r public     _site/

          # GitHub Pages config files
          cp public/CNAME  _site/CNAME
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
